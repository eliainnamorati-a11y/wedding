  <style>
    /* Additional custom styles for the landing page */
    .top-bar {
      position: absolute;
      top: 2rem;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 10;
      color: #fff;
    }
    .countdown {
      font-family: var(--font-body);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 300;
    }
    .coordinates-bar {
      position: absolute;
      top: 2rem;
      left: 0;
      width: 100%;
      z-index: 10;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 3rem;
    }
    @media (max-width: 768px) {
      .coordinates-bar {
        padding: 0 1rem;
      }
    }
    .more-info {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.2rem;
    }
    .coords {
      font-family: var(--font-body);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      opacity: 0.8;
      text-align: center;
    }
    .more-info {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.2rem;
      margin-top: 1rem;
    }
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .h1-mega {
      font-size: clamp(4rem, 12vw, 10rem);
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      margin: 1rem 0;
      color: #fff;
    }
    /* Handwriting effect using slanted clip-path for natural italic reveal */
    .cursive-write {
      display: inline-block;
      white-space: nowrap;
      clip-path: polygon(-30% -50%, -30% -50%, -60% 150%, -60% 150%);
      padding: 0.2em;
      margin: -0.2em;
    }
    .hero.expanded .mozart-title.cursive-write {
      animation: writingAnim 9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 0.5s;
    }
    .hero.expanded .mozart-date.cursive-write {
      animation: writingAnim 7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 4.5s;
    }
    @keyframes writingAnim {
      to {
        clip-path: polygon(-30% -50%, 150% -50%, 120% 150%, -60% 150%);
      }
    }
    .load-up {
      opacity: 0;
      transform: translateY(20px);
      animation: loadUpAnim 1s ease forwards;
    }
    @keyframes loadUpAnim {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div id="preloader" class="preloader" style="justify-content: center; align-items: center; background-color: #ffffff;">

    <div id="preloader-photos" class="preloader-photos" style="position: absolute; z-index: 1; display: flex; gap: 2rem; justify-content: center; align-items: center; width: 90%; max-width: 1200px; opacity: 0;">
      <img src="JPGS/03.jpg" alt="Elia and Daniel 1" class="preloader-img">
      <img src="JPGS/05.jpg" alt="Elia and Daniel 2" class="preloader-img">
      <img src="JPGS/06 (1).jpg" alt="Elia and Daniel 3" class="preloader-img">
    </div>
  </div>

  <header class="hero">
    <!-- Background Video -->
    <video autoplay loop muted playsinline preload="auto" class="hero-bg-video">
      <source src="Elia%20wedding.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    
    <div class="top-bar" style="font-family: var(--font-body); letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.9rem;">
      <span>ROME, ITALY</span>
    </div>    <div class="hero-content">
      <h1 class="h1-mega" style="margin-bottom: 0;">
        <span class="mozart-title">Elia & Daniel</span>
      </h1>
      <div class="location-text">
        SAVE THE DATE
      </div>
      <div class="hero-date">
        <span class="mozart-date">April 17, 2027</span>
      </div>
    </div>

    <div class="coordinates-bar">
      <div class="coords">
        <span>41°54′14″N 12°27′8″E</span>
      </div>
      <div class="coords">
        <span>41°53′20″N 12°27′44″E</span>
      </div>
    </div>
    

  </header>

</body>
