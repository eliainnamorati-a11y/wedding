<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elia & Daniel | Save the Date</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
  <style>
    /* Additional custom styles for the landing page */
    .top-bar {
      position: absolute;
      top: 2rem;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 10;
      color: #fff;
    }
    .countdown {
      font-family: var(--font-body);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 300;
    }
    .coordinates-bar {
      position: absolute;
      top: 2rem;
      left: 0;
      width: 100%;
      z-index: 10;
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 3rem;
    }
    @media (max-width: 768px) {
      .coordinates-bar {
        padding: 0 1rem;
      }
    }
    .more-info {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.2rem;
    }
    .coords {
      font-family: var(--font-body);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      opacity: 0.8;
      text-align: center;
    }
    .more-info {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 1.2rem;
      margin-top: 1rem;
    }
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .h1-mega {
      font-size: clamp(4rem, 12vw, 10rem);
      font-family: 'Great Vibes', cursive;
      font-weight: 400;
      margin: 1rem 0;
      color: #fff;
    }
    /* Handwriting effect using slanted clip-path for natural italic reveal */
    .cursive-write {
      display: inline-block;
      white-space: nowrap;
      clip-path: polygon(-30% -50%, -30% -50%, -60% 150%, -60% 150%);
      padding: 0.2em;
      margin: -0.2em;
    }
    .hero.expanded .mozart-title.cursive-write {
      animation: writingAnim 9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 0.5s;
    }
    .hero.expanded .mozart-date.cursive-write {
      animation: writingAnim 7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      animation-delay: 4.5s;
    }
    @keyframes writingAnim {
      to {
        clip-path: polygon(-30% -50%, 150% -50%, 120% 150%, -60% 150%);
      }
    }
    .load-up {
      opacity: 0;
      transform: translateY(20px);
      animation: loadUpAnim 1s ease forwards;
    }
    @keyframes loadUpAnim {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div id="preloader" class="preloader" style="justify-content: center; flex-direction: column; gap: 20px; background-color: #ffffff;">
    <video id="preloader-video" class="preloader-video-logo" src="Animate_this_dont_add_glitter_202605251133.mp4" autoplay muted playsinline></video>
    

  </div>

  <header class="hero">
    <!-- Background Video -->
    <video loop muted playsinline class="hero-bg-video">
      <source src="Elia%20wedding.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>
    
    <div class="top-bar load-up" style="animation-delay: 0.8s; font-family: var(--font-body); letter-spacing: 0.2em; text-transform: uppercase; font-size: 0.9rem;">
      <span class="stamp-container" style="cursor: pointer;">
        ROME, ITALY
        <img src="assets/images/vatican_stamp.png" class="hover-stamp stamp-center" alt="Vatican Stamp">
      </span>
    </div>    <div class="hero-content load-up" style="animation-delay: 0.2s;">
      <h1 class="h1-mega load-up" style="animation-delay: 0.5s; margin-bottom: 0;">
        <span class="mozart-title cursive-write">Elia & Daniel</span>
      </h1>
      <div class="location-text load-up" style="opacity: 0; animation: loadUpAnim 1s ease forwards; animation-delay: 3.0s;">
        SAVE THE DATE
      </div>
      <div class="hero-date load-up" style="opacity: 0; animation: loadUpAnim 1.5s ease forwards; animation-delay: 4.0s;">
        <span class="mozart-date cursive-write">April 17, 2027</span>
      </div>
    </div>

    <div class="coordinates-bar load-up" style="animation-delay: 0.8s;">
      <div class="coords">
        <span class="stamp-container" style="cursor: pointer;">
          41°54′14″N 12°27′8″E
          <img src="assets/images/vatican_stamp.png" class="hover-stamp stamp-left" alt="Vatican Stamp">
        </span>
      </div>
      <div class="coords">
        <span class="stamp-container" style="cursor: pointer;">
          41°53′20″N 12°27′44″E
          <img src="assets/images/villa_stamp.png" class="hover-stamp stamp-right" alt="Villa Stamp">
        </span>
      </div>
    </div>
    

  </header>

</body>
</html>
