      font-size: 1.2rem;
    }
    .coords {

      font-size: 0.8rem;

    .cursive-write {

      clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
      animation: writingAnim 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    @keyframes writingAnim {
      to {
        clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
      }
    }
    .load-up {
      opacity: 0;
      transform: translateY(20px);
      animation: loadUpAnim 1s ease forwards;
    }
    @keyframes loadUpAnim {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
